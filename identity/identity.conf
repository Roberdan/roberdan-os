# identity.conf — machine-readable identity (bash-sourceable KEY=value, no spaces).
# What actually consumes each key today (honest wiring, not aspiration):
#   full_name — read by bin/sync.sh at generation time (injected into wrappers).
#   rda_home  — documentation of the value to `export RDA_HOME=...` in your shell;
#               scripts read the ENV VAR, not this file (so they work standalone).
#   slug / primary_language / twin_handle — written by bin/identity-init.sh, reserved
#               for future generator use; nothing reads them yet.
# Forkers: this file is yours — rewrite the values (bin/identity-init.sh scaffolds it).
slug=roberdan
full_name="Roberto D'Angelo"
primary_language=it
twin_handle=twin
rda_home="$HOME/.roberdan-os"

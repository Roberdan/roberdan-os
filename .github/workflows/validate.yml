name: validate
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq
      - name: Run validate.sh
        run: bash test/validate.sh
        # NB: leak-check degrades to no-op without private/.denylist (absent in CI):
        # the denylist is local-only. The confidential gate runs locally pre-commit.

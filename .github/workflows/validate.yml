name: validate
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq
      - name: Run validate.sh
        run: bash test/validate.sh
        # NB: il leak-check degrada a no-op senza private/.denylist (assente in CI):
        # la denylist è local-only. Il gate confidenziale gira in locale pre-commit.
